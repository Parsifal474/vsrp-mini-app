<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВСРП — Билеты на речные рейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --vsrp-blue: #004789;
            --vsrp-blue-dark: #003366;
            --vsrp-light: #f4f8fd;
            --vsrp-accent: #ff7a00;
            --vsrp-accent-hover: #e66d00;
            --text-dark: #1a1a1a;
            --text-gray: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.72);
            --glass-border: rgba(255, 255, 255, 0.45);
            --shadow-sm: 0 4px 16px rgba(0, 71, 137, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 71, 137, 0.12);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.15);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--vsrp-light);
            color: var(--text-dark);
            padding-bottom: 90px;
            min-height: 100vh;
        }

        /* --- ШАПКА --- */
        .navbar {
            background: linear-gradient(135deg, var(--vsrp-blue) 0%, var(--vsrp-blue-dark) 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-logo {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-logo-icon {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- КАТАЛОГ ДИНАМИЧЕСКИЙ --- */
        .container { padding: 20px; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--vsrp-blue); }
        .section-subtitle { font-size: 13px; color: var(--text-gray); margin-bottom: 20px; font-weight: 500; }
        
        .ship-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            border: 1px solid rgba(0, 71, 137, 0.06);
        }

        .ship-img-wrapper { position: relative; height: 190px; }
        .ship-img { width: 100%; height: 100%; object-fit: cover; }
        .ship-badge {
            position: absolute; top: 12px; left: 12px; background: rgba(0, 71, 137, 0.88);
            color: white; padding: 6px 14px; border-radius: 30px; font-size: 11px; font-weight: 700;
        }
        .ship-content { padding: 18px; }
        .ship-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
        .ship-route { font-size: 13px; color: var(--text-gray); margin-bottom: 14px; display: flex; align-items: center; gap: 4px; }
        .ship-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eef2f7; padding-top: 14px; }
        .ship-price { font-size: 20px; font-weight: 700; color: var(--vsrp-accent); }
        .ship-price span { font-size: 12px; font-weight: 500; color: var(--text-gray); }
        .btn-select { background: var(--vsrp-blue); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; }

        /* --- ЭКРАН ДЕТАЛЕЙ --- */
        #detail-page { display: none; background: var(--vsrp-light); min-height: 100vh; }
        .detail-hero { height: 260px; position: relative; }
        .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
        .detail-hero-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0, 36, 68, 0.92) 0%, transparent 100%);
            padding: 40px 20px 30px; color: white;
        }
        .detail-hero-title { font-size: 24px; font-weight: 700; }
        .detail-hero-price { font-weight: 600; margin-top: 6px; font-size: 15px; opacity: 0.9; }
        .detail-body { padding: 24px 20px 40px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; background: var(--vsrp-light); position: relative; top: -24px; }
        .detail-desc { font-size: 14px; line-height: 1.7; color: var(--text-gray); margin-bottom: 24px; background: white; padding: 18px; border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }

        /* ВЫБОР ДАТЫ РЕЙСА */
        .date-selector-block { background: white; border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 8px; }
        .date-label { font-size: 14px; font-weight: 700; color: var(--vsrp-blue); }
        .vsrp-select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #cbd5e1; outline: none; font-size: 14px; font-weight: 600; color: var(--text-dark); background: white; }

        /* СХЕМА САЛОНА */
        .deck-container { background: white; border-radius: var(--radius-md); padding: 24px 16px; box-shadow: var(--shadow-sm); border: 1px solid rgba(0, 71, 137, 0.08); }
        .deck-title { text-align: center; font-weight: 700; color: var(--vsrp-blue); margin-bottom: 8px; font-size: 16px; }
        .deck-legend { display: flex; justify-content: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-gray); font-weight: 500; }
        .legend-dot { width: 14px; height: 14px; border-radius: 4px; border: 2px solid #cbd5e1; }
        .legend-dot.free { background: white; }
        .legend-dot.selected { background: var(--vsrp-accent); border-color: var(--vsrp-accent); }
        .legend-dot.occupied { background: #f1f5f9; border-color: #e2e8f0; }
        .seat-grid { display: grid; grid-template-columns: 1fr 1fr 36px 1fr 1fr; gap: 10px; justify-items: center; max-width: 280px; margin: 0 auto; }
        .seat { width: 44px; height: 44px; background-color: white; border: 2px solid #cbd5e1; border-radius: 10px 10px 4px 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--text-gray); cursor: pointer; position: relative; }
        .seat::after { content: ''; position: absolute; bottom: 4px; width: 20px; height: 3px; background: #cbd5e1; border-radius: 2px; }
        .seat.selected { background-color: var(--vsrp-accent); border-color: var(--vsrp-accent); color: white; transform: scale(1.05); }
        .seat.selected::after { background: white; opacity: 0.5; }
        .seat.occupied { background-color: #f1f5f9; border-color: #e2e8f0; color: #cbd5e1; cursor: not-allowed; text-decoration: line-through; }
        .seat.occupied::after { background: #e2e8f0; }
        .aisle { width: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #d1d5db; font-weight: 600; }

        /* --- КАНЦЕЛЯРИЯ, БИЛЕТЫ И АРХИВЫ --- */
        .overlay { position: fixed; inset: 0; background: rgba(0, 20, 40, 0.5); backdrop-filter: blur(4px); z-index: 200; opacity: 0; visibility: hidden; transition: opacity 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
        .cabinet-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--vsrp-light); border-radius: var(--radius-lg) var(--radius-lg) 0 0; z-index: 201; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
        .cabinet-drawer.active { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 4px; background: #d1d5db; border-radius: 4px; margin: 12px auto 0; }
        .drawer-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
        .drawer-title { font-size: 20px; font-weight: 700; color: var(--vsrp-blue); }
        .drawer-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: white; color: var(--text-gray); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .drawer-body { padding: 0 20px 32px; }

        .profile-card { background: linear-gradient(135deg, var(--vsrp-blue) 0%, var(--vsrp-blue-dark) 100%); border-radius: var(--radius-md); padding: 20px; color: white; margin-bottom: 16px; }
        .profile-avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; margin-bottom: 12px; border: 2px solid rgba(255, 255, 255, 0.3); }
        .profile-name { font-size: 18px; font-weight: 700; }
        .profile-username { font-size: 13px; opacity: 0.75; }

        .balance-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        .balance-label { font-size: 13px; color: var(--text-gray); }
        .balance-amount { font-size: 24px; font-weight: 700; color: var(--vsrp-blue); }

        .tickets-section { background: white; border-radius: var(--radius-md); padding: 18px; box-shadow: var(--shadow-sm); margin-bottom: 16px; }
        .tickets-section-title { font-size: 16px; font-weight: 700; color: var(--vsrp-blue); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .ticket-item { background: var(--vsrp-light); border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px; border-left: 4px solid var(--vsrp-accent); display: flex; justify-content: space-between; align-items: center; }
        .ticket-ship { font-size: 14px; font-weight: 700; color: var(--text-dark); }
        .ticket-meta { font-size: 12px; color: var(--text-gray); margin-top: 4px; line-height: 1.5; }
        .btn-cancel-ticket { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; }
        
        /* Архивный блок */
        .archive-item { background: #f8fafc; border-left: 4px solid #94a3b8; opacity: 0.75; }
        .archive-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
        .status-cancelled { background: #fee2e2; color: #ef4444; }
        .status-old { background: #e2e8f0; color: #64748b; }

        /* МОДАЛКА КРАСИВАЯ ПОДТВЕРЖДЕНИЯ */
        .confirm-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: white; padding: 24px; border-radius: var(--radius-md); z-index: 300; width: 90%; max-width: 320px; box-shadow: var(--shadow-lg); opacity: 0; visibility: hidden; transition: all 0.2s; }
        .confirm-modal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .confirm-title { font-size: 18px; font-weight: 700; color: var(--vsrp-blue); margin-bottom: 12px; }
        .confirm-details { font-size: 13px; color: var(--text-dark); margin-bottom: 20px; line-height: 1.6; background: var(--vsrp-light); padding: 12px; border-radius: 8px; }
        .confirm-actions { display: flex; gap: 10px; }
        .btn-confirm { flex: 1; background: var(--vsrp-accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #e2e8f0; color: var(--text-dark); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="navbar" id="navbar">
        <div class="navbar-logo"><div class="navbar-logo-icon">⚓</div><span>ВСРП БОТ</span></div>
        <button class="profile-btn" id="profile-btn">🎭 Личный кабинет</button>
    </header>

    <main id="catalog-page" class="container">
        <h1 class="section-title">Каталог маршрутов</h1>
        <p class="section-subtitle">Официальные регулярные рейсы Восточно-Сибирского речного пароходства</p>
        <div id="dynamic-ships-catalog"></div>
    </main>

    <section id="detail-page">
        <div class="detail-hero">
            <img id="detail-img" src="" alt="Судно">
            <div class="detail-hero-overlay">
                <h2 id="detail-title" class="detail-hero-title">Название</h2>
                <p id="detail-price" class="detail-hero-price">0 ₽</p>
            </div>
        </div>

        <div class="detail-body">
            <p id="detail-desc" class="detail-desc"></p>

            <div class="date-selector-block">
                <label class="date-label" for="date-select">📅 Выберите дату отправления:</label>
                <select id="date-select" class="vsrp-select"></select>
            </div>

            <div class="deck-container">
                <div class="deck-title">СХЕМА ПАССАЖИРСКИХ МЕСТ</div>
                <div class="deck-legend">
                    <span class="legend-item"><span class="legend-dot free"></span> Свободно</span>
                    <span class="legend-item"><span class="legend-dot selected"></span> Выбрано</span>
                    <span class="legend-item"><span class="legend-dot occupied"></span> Занято</span>
                </div>
                <div id="seat-map" class="seat-grid"></div>
            </div>
        </div>
    </section>

    <div class="overlay" id="cabinet-overlay"></div>
    <aside class="cabinet-drawer" id="cabinet-drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-header">
            <h2 class="drawer-title">Ваш профиль</h2>
            <button class="drawer-close" id="drawer-close">✕</button>
        </div>
        <div class="drawer-body">
            <div class="profile-card">
                <div class="profile-avatar" id="profile-avatar">👤</div>
                <div class="profile-name" id="profile-name">Пассажир ВСРП</div>
                <div class="profile-username" id="profile-username">Загрузка...</div>
            </div>

            <div class="balance-card">
                <div>
                    <div class="balance-label">Личный счёт пассажира</div>
                    <div class="balance-amount" id="balance-amount">0 ₽</div>
                    <div style="display: flex; gap: 8px; margin-top: 12px;">
                        <input type="number" id="topup-input" placeholder="Сумма" style="width: 90px; padding: 8px; border-radius: 8px; border: 1px solid var(--glass-border); font-weight: 600;">
                        <button id="btn-topup" style="background: var(--vsrp-accent); color: white; border: none; padding: 8px 14px; border-radius: 8px; font-weight: bold; cursor: pointer;">➕ Пополнить</button>
                    </div>
                </div>
            </div>

            <div class="tickets-section">
                <h3 class="tickets-section-title">🎫 Активные билеты</h3>
                <div id="active-tickets-list"></div>
            </div>

            <div class="tickets-section" style="background: #f8fafc;">
                <h3 class="tickets-section-title" style="color: #64748b;">📂 Архив и история (1 год)</h3>
                <div id="archive-tickets-list"></div>
            </div>

            <button id="btn-exit-app" style="width:100%; padding:14px; background:#fee2e2; color:#ef4444; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:14px;">🚪 Закрыть приложение</button>
        </div>
    </aside>

    <div class="confirm-modal" id="confirm-modal">
        <div class="confirm-title">Подтверждение оплаты</div>
        <div class="confirm-details" id="confirm-details"></div>
        <div class="confirm-actions">
            <button class="btn-cancel" id="btn-cancel-pay">Отмена</button>
            <button class="btn-confirm" id="btn-confirm-pay">Оплатить билет</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#004789');
        tg.MainButton.color = '#ff7a00';
        tg.MainButton.textColor = '#ffffff';

        // Статические метаданные кораблей для рендеринга
        const SHIP_METADATA = {
            barguzin: { desc: 'Скоростное комфортабельное судно на воздушной каверне. Панорамные окна, салон самолетного типа.', img: 'https://images.unsplash.com/photo-1544365558-35aa4afcf11f?auto=format&fit=crop&w=800&q=80' },
            hivus: { desc: 'Судно на воздушной подушке (амфибия). Идеально подходит для передвижения по льду Байкала и мелководью.', img: 'https://images.unsplash.com/photo-1518182170546-076616fdcbdd?auto=format&fit=crop&w=800&q=80' }
        };

        // Состояние приложения (Парсится напрямую из СУБД)
        let userBalance = 0;
        let DATABASE_TOURS = [];
        let DATABASE_TICKETS = [];
        
        let currentShipId = '';
        let selectedDate = '';
        let selectedSeats = [];

        // Инициализация данных из параметров URL Питона
        function parseUrlState() {
            const params = new URLSearchParams(window.location.search);
            userBalance = parseInt(params.get('balance')) || 0;
            
            try {
                DATABASE_TOURS = JSON.parse(decodeURIComponent(params.get('tours'))) || [];
                DATABASE_TICKETS = JSON.parse(decodeURIComponent(params.get('tickets'))) || [];
            } catch(e) {
                console.error("Ошибка десериализации БД данных:", e);
            }
            
            document.getElementById('balance-amount').textContent = userBalance.toLocaleString('ru-RU') + ' ₽';
            renderCatalog();
            renderProfile();
            renderTicketsLists();
        }

        // Рендеринг каталога кораблей из БД
        function renderCatalog() {
            const container = document.getElementById('dynamic-ships-catalog');
            container.innerHTML = '';
            
            // Группируем туры по shipId для отрисовки уникальных карточек
            const uniqueShips = {};
            DATABASE_TOURS.forEach(t => {
                if (!uniqueShips[t.shipId]) uniqueShips[t.shipId] = t;
            });

            Object.values(uniqueShips).forEach(ship => {
                const meta = SHIP_METADATA[ship.shipId] || { desc: 'Пассажирский рейс ВСРП', img: 'https://images.unsplash.com/photo-1544365558-35aa4afcf11f?auto=format&fit=crop&w=800&q=80' };
                container.innerHTML += `
                    <article class="ship-card" onclick="openShipDetails('${ship.shipId}')">
                        <div class="ship-img-wrapper">
                            <span class="ship-badge">РЕГУЛЯРНЫЙ РЕЙС</span>
                            <img src="${meta.img}" class="ship-img" alt="">
                        </div>
                        <div class="ship-content">
                            <h2 class="ship-title">${ship.title}</h2>
                            <p class="ship-route">📍 ${ship.route}</p>
                            <div class="ship-footer">
                                <div class="ship-price">${ship.price.toLocaleString('ru-RU')} ₽ <span>/ место</span></div>
                                <button class="btn-select">Выбрать рейс</button>
                            </div>
                        </div>
                    </article>
                `;
            });
        }

        // Экран деталей корабля и выпадающий список дат
        function openShipDetails(shipId) {
            currentShipId = shipId;
            selectedSeats = [];
            tg.MainButton.hide();

            const toursForShip = DATABASE_TOURS.filter(t => t.shipId === shipId);
            if(toursForShip.length === 0) return;

            const baseTour = toursForShip[0];
            const meta = SHIP_METADATA[shipId] || { desc: '', img: '' };

            document.getElementById('detail-title').textContent = baseTour.title;
            document.getElementById('detail-price').textContent = baseTour.price.toLocaleString('ru-RU') + ' ₽ за место';
            document.getElementById('detail-desc').textContent = meta.desc;
            document.getElementById('detail-img').src = meta.img;

            // Заполняем выпадающий список дат из базы
            const selectEl = document.getElementById('date-select');
            selectEl.innerHTML = toursForShip.map(t => `<option value="${t.date}">${t.date}</option>`).join('');
            selectedDate = selectEl.value;

            // Перерисовываем карту мест под выбранную дату
            updateSeatMapForSelectedDate();

            selectEl.onchange = function() {
                selectedDate = this.value;
                selectedSeats = [];
                updateMainButton();
                updateSeatMapForSelectedDate();
            };

            document.getElementById('catalog-page').style.display = 'none';
            document.getElementById('navbar').style.display = 'none';
            document.getElementById('detail-page').style.display = 'block';
            tg.BackButton.show();
        }

        function updateSeatMapForSelectedDate() {
            const activeTour = DATABASE_TOURS.find(t => t.shipId === currentShipId && t.date === selectedDate);
            const occupied = activeTour ? activeTour.occupied : [];
            
            const seatMap = document.getElementById('seat-map');
            seatMap.innerHTML = '';

            let seatNumber = 1;
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col < 5; col++) {
                    if (col === 2) {
                        const aisle = document.createElement('div');
                        aisle.className = 'aisle';
                        aisle.textContent = '↕';
                        seatMap.appendChild(aisle);
                        continue;
                    }

                    const seat = document.createElement('div');
                    seat.className = 'seat';
                    seat.textContent = seatNumber;

                    if (occupied.includes(seatNumber)) {
                        seat.classList.add('occupied');
                    } else {
                        const num = seatNumber;
                        seat.addEventListener('click', function () { toggleSeat(this, num); });
                    }
                    seatMap.appendChild(seat);
                    seatNumber++;
                }
            }
        }

        function toggleSeat(element, num) {
            const idx = selectedSeats.indexOf(num);
            if (idx !== -1) {
                selectedSeats.splice(idx, 1);
                element.classList.remove('selected');
            } else {
                selectedSeats.push(num);
                element.classList.add('selected');
            }
            updateMainButton();
        }

        function updateMainButton() {
            if (selectedSeats.length > 0) {
                const tour = DATABASE_TOURS.find(t => t.shipId === currentShipId && t.date === selectedDate);
                const cost = selectedSeats.length * tour.price;
                tg.MainButton.setText(`ОФОРМИТЬ (${selectedSeats.length} МЕСТ) ЗА ${cost.toLocaleString('ru-RU')} ₽`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // ШАГ 1 ПОКУПКИ: Показ кастомного окна подтверждения
        tg.MainButton.onClick(function() {
            const tour = DATABASE_TOURS.find(t => t.shipId === currentShipId && t.date === selectedDate);
            const cost = selectedSeats.length * tour.price;

            if (userBalance < cost) {
                tg.showAlert('❌ Недостаточно средств на балансе. Пожалуйста, пополните счёт.');
                return;
            }

            document.getElementById('confirm-details').innerHTML = `
                <b>Судно:</b> ${tour.title}<br>
                <b>Маршрут:</b> ${tour.route}<br>
                <b>Дата отправления:</b> ${selectedDate}<br>
                <b>Номера мест:</b> ${selectedSeats.join(', ')}<br>
                <b>Сумма к списанию:</b> <span style="color:var(--vsrp-accent); font-weight:bold;">${cost.toLocaleString('ru-RU')} ₽</span>
            `;
            document.getElementById('cabinet-overlay').classList.add('active');
            document.getElementById('confirm-modal').classList.add('active');
        });

        // ШАГ 2 ПОКУПКИ: Отправка JSON в СУБД (приложение закроется)
        document.getElementById('btn-confirm-pay').onclick = function() {
            const tour = DATABASE_TOURS.find(t => t.shipId === currentShipId && t.date === selectedDate);
            tg.sendData(JSON.stringify({
                action: 'purchase',
                shipId: currentShipId,
                ship: tour.title,
                route: tour.route,
                date: selectedDate,
                seats: selectedSeats,
                price: selectedSeats.length * tour.price
            }));
        };

        // ОТМЕНА БИЛЕТА (ВОЗВРАТ)
        function cancelTicket(ticketId) {
            tg.showConfirm("Вы действительно хотите отменить бронирование билета и вернуть средства на баланс?", function(yes) {
                if(yes) {
                    tg.sendData(JSON.stringify({
                        action: 'cancel_ticket',
                        ticketId: ticketId
                    }));
                }
            });
        }

        // СОРТИРОВКА И РЕНДЕР: АКТИВНЫЕ И АРХИВ
        function renderTicketsLists() {
            const activeContainer = document.getElementById('active-tickets-list');
            const archiveContainer = document.getElementById('archive-tickets-list');
            
            activeContainer.innerHTML = '';
            archiveContainer.innerHTML = '';

            if (DATABASE_TICKETS.length === 0) {
                activeContainer.innerHTML = '<div style="text-align:center; color:var(--text-gray); font-size:13px; padding:10px;">Активных билетов нет</div>';
                archiveContainer.innerHTML = '<div style="text-align:center; color:var(--text-gray); font-size:13px; padding:10px;">Архив пуст</div>';
                return;
            }

            DATABASE_TICKETS.forEach(t => {
                if (t.status === 'active') {
                    activeContainer.innerHTML += `
                        <div class="ticket-item">
                            <div>
                                <div class="ticket-ship">${t.ship}</div>
                                <div class="ticket-meta">Маршрут: ${t.route}<br><b>Дата: ${t.date}</b><br>Места: ${t.seats.join(', ')}</div>
                                <div style="color:var(--vsrp-accent); font-weight:bold; font-size:13px; margin-top:4px;">${t.price.toLocaleString('ru-RU')} ₽</div>
                            </div>
                            <button class="btn-cancel-ticket" onclick="cancelTicket(${t.id})">Отменить</button>
                        </div>
                    `;
                } else {
                    archiveContainer.innerHTML += `
                        <div class="ticket-item archive-item">
                            <div>
                                <div class="ticket-ship">${t.ship}</div>
                                <div class="ticket-meta">Маршрут: ${t.route}<br>Дата: ${t.date}<br>Места: ${t.seats.join(', ')}</div>
                            </div>
                            <span class="archive-status status-cancelled">ОТМЕНЕН</span>
                        </div>
                    `;
                }
            });
            
            if(!activeContainer.innerHTML) activeContainer.innerHTML = '<div style="text-align:center; color:var(--text-gray); font-size:12px;">Нет активных поездок</div>';
            if(!archiveContainer.innerHTML) archiveContainer.innerHTML = '<div style="text-align:center; color:var(--text-gray); font-size:12px;">Архив за 1 год пуст</div>';
        }

        // СИСТЕМНЫЕ КНОПКИ UI И ПОПОЛНЕНИЕ ЛК
        tg.BackButton.onClick(function() {
            document.getElementById('detail-page').style.display = 'none';
            document.getElementById('catalog-page').style.display = 'block';
            document.getElementById('navbar').style.display = 'flex';
            tg.BackButton.hide();
            tg.MainButton.hide();
        });

        document.getElementById('btn-topup').onclick = function() {
            const inputEl = document.getElementById('topup-input');
            const amt = parseInt(inputEl.value);
            if (!amt || amt < 100) { tg.showAlert('Минимальная сумма зачисления — 100 ₽.'); return; }
            tg.sendData(JSON.stringify({ action: 'topup', amount: amt }));
        };

        document.getElementById('profile-btn').onclick = function() {
            document.getElementById('cabinet-overlay').classList.add('active');
            document.getElementById('cabinet-drawer').classList.add('active');
        };

        function closeCabinet() {
            document.getElementById('cabinet-overlay').classList.remove('active');
            document.getElementById('cabinet-drawer').classList.remove('active');
            document.getElementById('confirm-modal').classList.remove('active');
        }

        document.getElementById('drawer-close').onclick = closeCabinet;
        document.getElementById('btn-cancel-pay').onclick = closeCabinet;
        document.getElementById('btn-exit-app').onclick = function() { tg.close(); };
        document.getElementById('cabinet-overlay').onclick = function() {
            if(!document.getElementById('confirm-modal').classList.contains('active')) closeCabinet();
        };

        function renderProfile() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('profile-name').textContent = [user.first_name, user.last_name].filter(Boolean).join(' ');
                document.getElementById('profile-username').textContent = user.username ? '@' + user.username : 'Пассажир Telegram';
            }
        }

        // Старт развертывания
        parseUrlState();
    </script>
</body>
</html>
