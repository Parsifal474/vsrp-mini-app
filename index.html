<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВСРП - Билеты на Байкал</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Используем переменные цветов самого Telegram, чтобы подстраиваться под темную/светлую тему пользователя */
        body {
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 30px;
        }

        button {
            /* Кнопка тоже берет цвет из настроек Телеграма */
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">Добро пожаловать на борт! 🚢</div>
    <div id="user-greeting" class="subtitle">Загрузка данных...</div>

    <button id="main-btn">Посмотреть маршруты</button>

    <script>
        // Инициализируем объект Web App
        let tg = window.Telegram.WebApp;

        // Расширяем приложение на всю высоту экрана
        tg.expand();

        // Достаем имя пользователя прямо из Телеграма!
        let user = tg.initDataUnsafe?.user;
        let greetingElement = document.getElementById('user-greeting');
        
        if (user) {
            greetingElement.innerText = `Привет, ${user.first_name}! Куда отправимся?`;
        } else {
            greetingElement.innerText = "Привет, путешественник! Куда отправимся?";
        }

        // Вешаем событие на нашу кнопку
        document.getElementById('main-btn').addEventListener('click', function() {
            // Встроенное всплывающее окно Телеграма
            tg.showAlert("Тут мы скоро выведем список рейсов ВСРП!");
        });

        // Сообщаем Телеграму, что приложение готово к отображению
        tg.ready();
    </script>
</body>
</html>
